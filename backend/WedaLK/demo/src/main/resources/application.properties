# =============================================================
# WedaLK Application Configuration
# =============================================================

# ---- Server ----
# Cloud Run sets PORT env var; fallback to 8081 for local dev
server.port=${PORT:8081}

# ---- PostgreSQL Database (Neon) ----
# Set these via environment variables in Cloud Run or GCP console
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lankafix}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_CONNECTION_TIMEOUT_MS:20000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_IDLE_TIMEOUT_MS:60000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_MAX_LIFETIME_MS:300000}

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---- Application Info ----
spring.application.name=WedaLK

# ---- File Upload ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=./uploads

# ---- JWT Config ----
app.jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- AI Assist Config ----
# Do not commit real API keys. Set GEMINI_API_KEY in your local environment.
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash-lite}
app.ai.timeout-ms=${AI_TIMEOUT_MS:10000}

# ---- Admin seed config (temporary hardcoded plain password) ----
# ---- CORS ----
# Comma-separated list of allowed origins (set via env var for production)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ---- Admin seed config ----
app.admin.email=admin@wedalk.lk
app.admin.password=admin123
app.admin.full-name=System Admin


