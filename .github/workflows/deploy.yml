name: LankaFix CI/CD - Deploy to AWS ECS

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set up Java 17 for backend caching/verification (optional but recommended)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build, Tag, and Push Backend Image to ECR
      - name: Build, Tag, and Push Backend Image
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: lankafix-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend/WedaLK/demo
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Build, Tag, and Push Frontend Image to ECR
      - name: Build, Tag, and Push Frontend Image
        id: build-frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: lankafix-frontend
          IMAGE_TAG: ${{ github.sha }}
          # The ALB Endpoint (e.g. http://lankafix-alb-12345.us-east-1.elb.amazonaws.com/api)
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=$REACT_APP_API_URL \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Download active Task Definitions to modify and update
      - name: Download active task definitions
        run: |
          aws ecs describe-task-definition --task-definition lankafix-backend-task --query taskDefinition > task-def-backend.json
          aws ecs describe-task-definition --task-definition lankafix-frontend-task --query taskDefinition > task-def-frontend.json

      # Update the task definition with the newly built backend image tag
      - name: Fill in the new backend image ID in the ECS task definition
        id: render-backend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-backend.json
          container-name: backend
          image: ${{ steps.build-backend.outputs.image }}

      # Deploy Backend ECS Service
      - name: Deploy Backend ECS task
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend-task-def.outputs.task-definition }}
          service: lankafix-backend-service
          cluster: lankafix-cluster
          wait-for-service-stability: true

      # Update the task definition with the newly built frontend image tag
      - name: Fill in the new frontend image ID in the ECS task definition
        id: render-frontend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-frontend.json
          container-name: frontend
          image: ${{ steps.build-frontend.outputs.image }}

      # Deploy Frontend ECS Service
      - name: Deploy Frontend ECS task
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend-task-def.outputs.task-definition }}
          service: lankafix-frontend-service
          cluster: lankafix-cluster
          wait-for-service-stability: true
