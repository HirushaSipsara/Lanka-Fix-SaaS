version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lankafix-db
    environment:
      POSTGRES_DB: lankafix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lankafix"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/WedaLK/demo
      dockerfile: Dockerfile
    container_name: lankafix-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lankafix
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123
      JWT_SECRET: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
      JWT_EXPIRATION_MS: 86400000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Note: Since React builds statically, the browser running on the host machine
        # needs to access the backend API via localhost:8081.
        - REACT_APP_API_URL=http://localhost:8081/api
    container_name: lankafix-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
